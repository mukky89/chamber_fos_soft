name: build

# Builds the whole solution — including the WPF desktop app (VotschVc3.App),
# which only compiles on Windows — and runs the test suite on every push and
# pull request.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore VotschVc3.sln

      - name: Build (Release)
        run: dotnet build VotschVc3.sln -c Release --no-restore

      - name: Test
        run: dotnet test VotschVc3.sln -c Release --no-build --verbosity normal

      - name: Publish app (self-contained win-x64)
        run: >-
          dotnet publish src/VotschVc3.App/VotschVc3.App.csproj
          -c Release -r win-x64 --self-contained false
          -o publish/VotschVc3.App

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: VotschVc3.App
          path: publish/VotschVc3.App
