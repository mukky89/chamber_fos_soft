<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="400" viewBox="0 0 320 400"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edeff5"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#26304a"/>
      <stop offset="1" stop-color="#10141f"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="160" cy="387" rx="114" ry="9" fill="#00000022"/>

  <!-- Cabinet -->
  <rect x="40" y="22" width="240" height="346" rx="16" fill="url(#body)" stroke="#c6cad8" stroke-width="2"/>
  <line x1="250" y1="40" x2="250" y2="350" stroke="#d8dbe6" stroke-width="2"/>
  <g fill="#d2d5e1">
    <rect x="256" y="250" width="18" height="5" rx="2"/>
    <rect x="256" y="260" width="18" height="5" rx="2"/>
    <rect x="256" y="270" width="18" height="5" rx="2"/>
  </g>

  <!-- Brand + display -->
  <text x="58" y="44" font-size="13" font-weight="600" fill="#c42b2b">vötschtechnik</text>
  <rect x="206" y="34" width="50" height="22" rx="4" fill="#10141f"/>
  <text x="214" y="50" font-size="13" font-family="Consolas, monospace" fill="#4fe3c6">°C</text>

  <!-- Window -->
  <rect x="62" y="78" width="150" height="156" rx="12" fill="#c42b2b"/>
  <rect x="70" y="86" width="134" height="140" rx="7" fill="url(#glass)"/>
  <polygon points="74,90 110,90 80,222 74,222" fill="#ffffff16"/>

  <!-- Shelves -->
  <g stroke="#566080" stroke-width="2">
    <line x1="82" y1="176" x2="192" y2="176" opacity="0.7"/>
    <line x1="82" y1="196" x2="192" y2="196" opacity="0.7"/>
    <line x1="82" y1="216" x2="192" y2="216" opacity="0.55"/>
  </g>

  <!-- Fan -->
  <circle cx="139" cy="126" r="34" fill="#1a2138" stroke="#6a739a" stroke-width="2"/>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate"
                      from="0 139 126" to="360 139 126" dur="2.4s" repeatCount="indefinite"/>
    <g fill="#aeb7d6" opacity="0.92">
      <ellipse cx="139" cy="126" rx="30" ry="7"/>
      <ellipse cx="139" cy="126" rx="30" ry="7" transform="rotate(60 139 126)"/>
      <ellipse cx="139" cy="126" rx="30" ry="7" transform="rotate(120 139 126)"/>
    </g>
  </g>
  <circle cx="139" cy="126" r="7" fill="#11141e" stroke="#c42b2b" stroke-width="2"/>

  <!-- Handle / knob -->
  <rect x="236" y="150" width="9" height="74" rx="4" fill="#b7bccc"/>
  <circle cx="269" cy="137" r="17" fill="#f2f3f8" stroke="#a9aec0" stroke-width="4"/>
  <circle cx="269" cy="137" r="4" fill="#8a90a6"/>

  <!-- Louvers -->
  <g fill="#c42b2b" opacity="0.85">
    <rect x="64" y="286" width="120" height="7" rx="3"/>
    <rect x="64" y="298" width="120" height="7" rx="3"/>
    <rect x="64" y="310" width="120" height="7" rx="3"/>
    <rect x="64" y="322" width="120" height="7" rx="3"/>
    <rect x="64" y="334" width="120" height="7" rx="3"/>
  </g>
  <text x="200" y="312" font-size="13" font-weight="600" fill="#7c8099">VT³ 7060</text>

  <!-- Pendant control -->
  <rect x="14" y="250" width="34" height="7" rx="3" fill="#c0c4d2"/>
  <rect x="4" y="232" width="30" height="36" rx="6" fill="#0e1b22" stroke="#2a3340" stroke-width="1.5"/>
  <rect x="8" y="237" width="22" height="18" rx="3" fill="#1fa39a" opacity="0.85"/>

  <!-- Casters -->
  <g>
    <rect x="66" y="362" width="10" height="10" fill="#c2c5d2"/>
    <rect x="244" y="362" width="10" height="10" fill="#c2c5d2"/>
    <circle cx="71" cy="379" r="11" fill="#3a3d52"/>
    <circle cx="249" cy="379" r="11" fill="#3a3d52"/>
    <circle cx="71" cy="379" r="5" fill="#6a6f86"/>
    <circle cx="249" cy="379" r="5" fill="#6a6f86"/>
  </g>
</svg>
