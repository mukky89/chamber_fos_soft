<svg xmlns="http://www.w3.org/2000/svg" width="320" height="400" viewBox="0 0 320 400" fill="none">
  <defs>
    <linearGradient id="steelFront" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9ebef"/>
      <stop offset="0.18" stop-color="#f6f7f9"/>
      <stop offset="0.5" stop-color="#d4d8e0"/>
      <stop offset="0.82" stop-color="#eceef2"/>
      <stop offset="1" stop-color="#c9cdd6"/>
    </linearGradient>
    <linearGradient id="steelSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b6bbc6"/>
      <stop offset="1" stop-color="#9aa0ad"/>
    </linearGradient>
    <linearGradient id="steelTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfcfd"/>
      <stop offset="1" stop-color="#d3d7df"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dfe2e9"/>
      <stop offset="0.5" stop-color="#eef0f4"/>
      <stop offset="1" stop-color="#cfd3dc"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f5f8"/>
      <stop offset="1" stop-color="#dce0e7"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2130"/>
      <stop offset="1" stop-color="#0b0e16"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#2a3550"/>
      <stop offset="1" stop-color="#0b0e16"/>
    </radialGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="164" cy="372" rx="120" ry="15" fill="#000000" opacity="0.14"/>

  <!-- top face (perspective) -->
  <polygon points="60,52 96,34 288,34 252,52" fill="url(#steelTop)" stroke="#c4c8d2" stroke-width="1"/>
  <!-- right side face (perspective) -->
  <polygon points="252,52 288,34 288,332 252,354" fill="url(#steelSide)" stroke="#aeb3bf" stroke-width="1"/>
  <!-- side vent slots -->
  <g fill="#8a90a0" opacity="0.7">
    <rect x="264" y="250" width="16" height="4" rx="2"/>
    <rect x="264" y="260" width="16" height="4" rx="2"/>
    <rect x="264" y="270" width="16" height="4" rx="2"/>
    <rect x="264" y="280" width="16" height="4" rx="2"/>
  </g>

  <!-- front body -->
  <rect x="60" y="52" width="192" height="302" rx="12" fill="url(#steelFront)" stroke="#c0c4cf" stroke-width="1.5"/>

  <!-- brushed-steel hint lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.35">
    <line x1="96" y1="126" x2="96" y2="346"/>
    <line x1="150" y1="126" x2="150" y2="346"/>
    <line x1="210" y1="126" x2="210" y2="346"/>
  </g>

  <!-- ===== Control panel ===== -->
  <rect x="72" y="60" width="168" height="54" rx="8" fill="url(#panelGrad)" stroke="#c6cad4" stroke-width="1"/>
  <!-- brand -->
  <text x="80" y="77" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="1" fill="#6a7180">POL-EKO</text>

  <!-- touchscreen -->
  <rect x="112" y="64" width="120" height="46" rx="5" fill="url(#screenGlow)" stroke="#2c3547" stroke-width="1"/>
  <!-- status bar -->
  <circle cx="120" cy="72" r="2.2" fill="#8b93a8"/>
  <rect x="126" y="70.5" width="9" height="3" rx="1.5" fill="#8b93a8"/>
  <circle cx="224" cy="72" r="2.2" fill="#4fd6c4"/>
  <!-- big temperature -->
  <text x="172" y="96" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#e9f6ff">27.7°C</text>
  <!-- little function icons -->
  <g fill="#7f8aa3">
    <rect x="130" y="102" width="7" height="5" rx="1"/>
    <rect x="146" y="101" width="6" height="6" rx="3"/>
    <rect x="162" y="102" width="4" height="5"/>
    <rect x="178" y="101" width="6" height="6" rx="1"/>
    <path d="M196 101 l4 3 -4 3 z"/>
  </g>

  <!-- ===== Door ===== -->
  <rect x="72" y="122" width="168" height="216" rx="9" fill="url(#doorGrad)" stroke="#c2c6d1" stroke-width="1.5"/>
  <!-- inner door seam -->
  <rect x="80" y="130" width="152" height="200" rx="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <rect x="80" y="130" width="152" height="200" rx="6" fill="none" stroke="#b9bdc9" stroke-width="1" opacity="0.5" transform="translate(1,1)"/>

  <!-- handle -->
  <circle cx="96" cy="232" r="7" fill="#2a2d33" stroke="#1a1c20" stroke-width="1"/>
  <rect x="96" y="226" width="58" height="12" rx="6" fill="#26282e" stroke="#17181c" stroke-width="1"/>
  <circle cx="96" cy="232" r="2.4" fill="#4b4f57"/>

  <!-- feet -->
  <g fill="#3a3d48">
    <rect x="70" y="354" width="12" height="14" rx="2"/>
    <rect x="230" y="354" width="12" height="14" rx="2"/>
  </g>
  <rect x="256" y="352" width="10" height="12" rx="2" fill="#31343d"/>
</svg>
